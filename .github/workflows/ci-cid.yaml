name: CI and Deploy Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'preview' || 'main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        env:
          # Optional: set PAGES_BASE_PATH only if you need an absolute base (rare). Default build uses relative ./ in vite.config.
          VITE_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          npm ci
          npm run build
          # HOLIDAYS_API_BASE must include the stage path (no /holidays suffix), e.g.
          # https://xxxx.execute-api.us-west-2.amazonaws.com/prod
          # CORS for https://www.trackmyholidays.com must be enabled on that API (Authorization header ⇒ preflight OPTIONS).
          echo '{
            "environment": "${{ github.event_name == 'pull_request' && 'preview' || 'main' }}",
            "google_account": "${{ vars.GOOGLE_ACCOUNT }}",
            "api_base_url": "${{ vars.HOLIDAYS_API_BASE }}"
          }' > build/env.json

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
